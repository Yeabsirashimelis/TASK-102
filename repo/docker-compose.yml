services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: retailops
      POSTGRES_USER: retailops
      POSTGRES_PASSWORD: retailops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailops"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://retailops:retailops@db:5432/retailops
      JWT_SECRET: change-me-in-production-use-64-random-hex-chars
      FIELD_ENCRYPTION_KEY: ozj5i7XhcCHCV/GggzZRrDA8XfsVDi/0gkwb1OKwEXs=
      RUST_LOG: info
      BIND_ADDR: 0.0.0.0:8080
      FILE_STORAGE_PATH: /app/data/uploads
    ports:
      - "8081:8080"
    volumes:
      - uploads:/app/data/uploads

volumes:
  pgdata:
  uploads:
